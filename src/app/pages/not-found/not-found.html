<div class="min-h-screen flex flex-col items-center justify-center
            bg-[#111111] text-center px-8">

  <!-- Número 404 -->
  <h1 class="text-[#FACD3D] font-bold"
      style="font-size: 120px; line-height: 1;">
    404
  </h1>

  <!-- Ícono -->
  <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64"
       viewBox="0 0 24 24" fill="none"
       stroke="#535353" stroke-width="1.5" class="mb-6">
    <path d="M9 18V5l12-2v13"/>
    <circle cx="6" cy="18" r="3"/>
    <circle cx="18" cy="16" r="3"/>
    <line x1="1" y1="1" x2="23" y2="23" stroke="#535353"/>
  </svg>

  <h2 class="text-white text-2xl font-semibold mb-3">
    Página no encontrada
  </h2>
  <p class="text-[#A0A0A0] text-sm mb-8 max-w-sm">
    La página que buscas no existe o fue eliminada.
  </p>

  <!-- RÚBRICA #7 — Event binding (click) -->
  <button
    (click)="goHome()"
    class="px-8 py-3 bg-[#FACD3D] text-black font-semibold
           rounded-full hover:bg-yellow-300 transition-colors">
    Volver al inicio
  </button>

</div>
