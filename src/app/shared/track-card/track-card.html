<div
  class="flex items-center gap-3 px-4 py-2 rounded-lg hover:bg-[#242424] transition-colors group cursor-pointer overflow-hidden min-w-0"
  [class.bg-[#242424]]="isCurrentTrack"
  (click)="player.play(track)"
>
  <!-- Cover -->
  <img [src]="cover" [alt]="title" class="w-10 h-10 rounded object-cover flex-shrink-0" />

  <!-- Info -->
  <div class="flex flex-col flex-1 min-w-0">
    <span class="text-white text-sm font-medium truncate" [class.text-[#FACD3D]]="isCurrentTrack">
      {{ title }}
    </span>
    <span class="text-[#A0A0A0] text-xs truncate">
      {{ artistName }}
    </span>
  </div>

  <!-- Playing icon -->
  @if (isCurrentTrack && player.isPlaying()) {
    <svg
      xmlns="http://www.w3.org/2000/svg"
      class="w-3 h-3 flex-shrink-0"
      viewBox="0 0 24 24"
      fill="#FACD3D"
    >
      <polygon points="5,3 19,12 5,21" />
    </svg>
  }

  <!-- Duration -->
  <span class="text-[#A0A0A0] text-xs flex-shrink-0">
    {{ duration | duration }}
  </span>

  <!-- Add button -->
  @if (showAddButton) {
    <button
      (click)="$event.stopPropagation(); addToPlaylist()"
      class="text-xs px-2 py-1 rounded border border-[#535353] text-[#A0A0A0] hover:text-white hover:border-white transition-colors opacity-0 group-hover:opacity-100 flex-shrink-0"
    >
      + Playlist
    </button>
  }
</div>
